name: HACS Validation

on:
  push:
  pull_request:
  schedule:
    # Stagger the daily HACS check away from the common top-of-hour sample cron.
    - cron: "37 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-hacs:
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: "integration"
          comment: false
