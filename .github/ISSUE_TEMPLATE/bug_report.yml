name: Bug report
description: Report a reproducible problem with Domoticz Import.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: Please avoid sharing passwords, tokens, private URLs, or other secrets.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can this be reproduced?
    validations:
      required: true
  - type: input
    id: home-assistant-version
    attributes:
      label: Home Assistant version
      placeholder: "2026.6.0"
    validations:
      required: true
  - type: input
    id: domoticz-version
    attributes:
      label: Domoticz version
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: text
    validations:
      required: false
